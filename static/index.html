<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Festival Ops — Crowd Management Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .streaming-cursor::after {
      content: '\25AE';
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    @keyframes bounce-dot {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    .dot-bounce { display: inline-block; animation: bounce-dot 1.2s infinite ease-in-out; }
    .dot-bounce-1 { animation-delay: 0ms; }
    .dot-bounce-2 { animation-delay: 150ms; }
    .dot-bounce-3 { animation-delay: 300ms; }

    body { background: #111827; color: #f3f4f6; font-family: 'Inter', system-ui, sans-serif; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1f2937; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }

    canvas { display: block; }

    @keyframes advisory-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
    }
    .advisory-pulse { animation: advisory-pulse 1.5s infinite; }
  </style>
</head>
<body class="min-h-screen">
<script type="module">
  import { h, render } from 'https://esm.sh/preact@10';
  import { useState, useEffect, useRef, useCallback } from 'https://esm.sh/preact@10/hooks';
  import { html } from 'https://esm.sh/htm@3/preact';

  // ── Constants ──────────────────────────────────────────────────────────────

  const ZONES = {
    A: { name: 'Main Stage',  capacity: 500, rect: [30,  90, 400, 330], color: null },
    B: { name: 'Side Stage',  capacity: 300, rect: [430, 90, 620, 250], color: null },
    C: { name: 'Food Court',  capacity: 400, rect: [30, 370, 380, 490], color: null },
  };

  const KEYFRAMES = [
    { t:  0, A: 0.62, B: 0.45, C: 0.50 },
    { t: 30, A: 0.74, B: 0.55, C: 0.60 },
    { t: 48, A: 0.91, B: 0.65, C: 0.70 },
    { t: 60, A: 0.96, B: 0.70, C: 0.75 },
    { t: 72, A: 0.96, B: 0.72, C: 0.77 },
    { t: 120, A: 0.96, B: 0.74, C: 0.78 },
  ];

  // Only multi-modal models are user-selectable. Text-only models (deepseek, nemotron-ultra)
  // are used internally by the advisory pipeline and cannot process images.
  const MODELS = [
    { value: 'gemma',    label: 'Gemma 4' },
    { value: 'nemotron', label: 'Nemotron Omni' },
    { value: 'kimi',     label: 'Kimi K2.6' },
  ];

  function densityColor(pct) {
    if (pct < 0.70) return '#22c55e';
    if (pct < 0.85) return '#eab308';
    if (pct < 0.95) return '#f97316';
    return '#ef4444';
  }

  function riskLabel(pct) {
    if (pct < 0.70) return 'SAFE';
    if (pct < 0.85) return 'WATCH';
    if (pct < 0.95) return 'WARNING';
    return 'CRITICAL';
  }

  function interpolateOcc(t) {
    const frames = KEYFRAMES;
    if (t <= frames[0].t) return { A: frames[0].A, B: frames[0].B, C: frames[0].C };
    if (t >= frames[frames.length - 1].t) {
      const last = frames[frames.length - 1];
      return { A: last.A, B: last.B, C: last.C };
    }
    let lo = frames[0], hi = frames[1];
    for (let i = 1; i < frames.length; i++) {
      if (frames[i].t >= t) { hi = frames[i]; lo = frames[i - 1]; break; }
    }
    const frac = (t - lo.t) / (hi.t - lo.t);
    return {
      A: lo.A + (hi.A - lo.A) * frac,
      B: lo.B + (hi.B - lo.B) * frac,
      C: lo.C + (hi.C - lo.C) * frac,
    };
  }

  // ── SSE helper ─────────────────────────────────────────────────────────────

  async function streamSSE(url, options, onEvent) {
    const resp = await fetch(url, options);
    if (!resp.ok) {
      const text = await resp.text();
      onEvent('error', text);
      return;
    }
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const lines = part.split('\n');
        const eventLine = lines.find(l => l.startsWith('event:'));
        const dataLine  = lines.find(l => l.startsWith('data:'));
        if (eventLine && dataLine) {
          onEvent(eventLine.slice(6).trim(), dataLine.slice(5).trim());
        }
      }
    }
  }

  // ── Dot helpers for natural crowd movement ────────────────────────────────

  function initDots(zoneId, pct) {
    const zone = ZONES[zoneId];
    const [x1, y1, x2, y2] = zone.rect;
    const hdrH = 42;
    const bodyY = y1 + hdrH;
    const bodyH = y2 - y1 - hdrH;
    const count = Math.round(pct * 280);
    return Array.from({ length: count }, () => ({
      x: x1 + 6 + Math.random() * (x2 - x1 - 12),
      y: bodyY + 4 + Math.random() * (bodyH - 8),
    }));
  }

  function nudgeDots(dots, zoneId, pct) {
    const zone = ZONES[zoneId];
    const [x1, y1, x2, y2] = zone.rect;
    const hdrH = 42;
    const bodyY = y1 + hdrH;
    const bodyH = y2 - y1 - hdrH;
    const target = Math.round(pct * 280);
    while (dots.length < target) {
      dots.push({
        x: x1 + 6 + Math.random() * (x2 - x1 - 12),
        y: bodyY + 4 + Math.random() * (bodyH - 8),
      });
    }
    if (dots.length > target) dots.length = target;
    const moveCount = Math.ceil(dots.length * 0.4);
    for (let i = 0; i < moveCount; i++) {
      const idx = Math.floor(Math.random() * dots.length);
      dots[idx].x = Math.max(x1 + 6, Math.min(x2 - 6, dots[idx].x + (Math.random() - 0.5) * 10));
      dots[idx].y = Math.max(bodyY + 4, Math.min(bodyY + bodyH - 4, dots[idx].y + (Math.random() - 0.5) * 10));
    }
  }

  // ── Canvas drawing ─────────────────────────────────────────────────────────

  function drawCanvas(canvas, occ, simTime, dots) {
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    ctx.fillStyle = '#1e1e23';
    ctx.fillRect(0, 0, W, H);

    // timestamp bar
    ctx.fillStyle = '#2a2a33';
    ctx.fillRect(0, 0, W, 30);
    ctx.fillStyle = '#94a3b8';
    ctx.font = '12px monospace';
    const mins = Math.floor(simTime / 60).toString().padStart(2, '0');
    const secs = (simTime % 60).toString().padStart(2, '0');
    ctx.fillText(`FESTIVAL OPS — SIM TIME ${mins}:${secs}`, 12, 20);

    // entry gates (triangles at bottom)
    const gates = [140, 260, 320];
    gates.forEach(gx => {
      ctx.beginPath();
      ctx.moveTo(gx, H);
      ctx.lineTo(gx - 14, H - 22);
      ctx.lineTo(gx + 14, H - 22);
      ctx.closePath();
      ctx.fillStyle = '#6366f1';
      ctx.fill();
      ctx.fillStyle = '#a5b4fc';
      ctx.font = '9px sans-serif';
      ctx.fillText('GATE', gx - 12, H - 5);
    });

    // draw each zone
    Object.entries(ZONES).forEach(([id, zone]) => {
      const pct = occ[id] || 0;
      const [x1, y1, x2, y2] = zone.rect;
      const zW = x2 - x1, zH = y2 - y1;
      const hdrH = 42;
      const bodyY = y1 + hdrH;
      const bodyH = zH - hdrH;
      const color = densityColor(pct);
      const count = Math.round(pct * zone.capacity);

      // zone fill
      ctx.fillStyle = '#28282f';
      ctx.fillRect(x1, y1, zW, zH);

      // border
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.strokeRect(x1, y1, zW, zH);

      // header strip
      ctx.fillStyle = color + '33';
      ctx.fillRect(x1, y1, zW, hdrH);

      ctx.fillStyle = '#f1f5f9';
      ctx.font = 'bold 11px sans-serif';
      ctx.fillText(`Zone ${id} — ${zone.name}`, x1 + 8, y1 + 14);

      ctx.fillStyle = color;
      ctx.font = 'bold 10px monospace';
      const label = `${count}/${zone.capacity} (${Math.round(pct * 100)}%) ${riskLabel(pct)}`;
      ctx.fillText(label, x1 + 8, y1 + 28);

      // progress bar
      const barW = zW - 16;
      ctx.fillStyle = '#3f3f4a';
      ctx.fillRect(x1 + 8, y1 + 33, barW, 5);
      ctx.fillStyle = color;
      ctx.fillRect(x1 + 8, y1 + 33, barW * pct, 5);

      // dots — persistent positions updated each frame for natural movement
      const zoneDots = dots ? (dots[id] || []) : [];
      zoneDots.forEach(dot => {
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.75;
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    });

    // legend (top right)
    const lx = 650, ly = 35;
    ctx.fillStyle = '#1e1e23cc';
    ctx.fillRect(lx - 6, ly - 4, 140, 84);
    ctx.fillStyle = '#94a3b8';
    ctx.font = 'bold 10px sans-serif';
    ctx.fillText('DENSITY LEGEND', lx, ly + 8);
    [['#22c55e','< 70% SAFE'],['#eab308','70-85% WATCH'],['#f97316','85-95% WARN'],['#ef4444','> 95% CRIT']].forEach(([c, lbl], i) => {
      ctx.fillStyle = c;
      ctx.fillRect(lx, ly + 14 + i * 16, 10, 10);
      ctx.fillStyle = '#cbd5e1';
      ctx.font = '10px sans-serif';
      ctx.fillText(lbl, lx + 14, ly + 23 + i * 16);
    });
  }

  // ── Advisory Card ──────────────────────────────────────────────────────────

  function AdvisoryCard({ advisory, onAccept, onOverride, overrideReason, setOverrideReason }) {
    const riskColors = {
      CRITICAL: 'border-red-500 bg-red-950',
      WARNING:  'border-orange-500 bg-orange-950',
      WATCH:    'border-yellow-500 bg-yellow-950',
      SAFE:     'border-green-500 bg-green-950',
    };
    const badgeColors = {
      CRITICAL: 'bg-red-600',
      WARNING:  'bg-orange-600',
      WATCH:    'bg-yellow-600',
      SAFE:     'bg-green-600',
    };
    const level = advisory.risk_level || 'WARNING';
    return html`
      <div class="border-l-4 rounded-lg p-4 mb-4 advisory-pulse ${riskColors[level] || riskColors.WARNING}">
        <div class="flex items-center gap-2 mb-2">
          <span class="text-lg">⚠</span>
          <span class="font-bold text-white text-sm px-2 py-0.5 rounded ${badgeColors[level] || badgeColors.WARNING}">
            ADVISORY — Zone ${advisory.zone || 'A'} — ${level}
          </span>
        </div>
        <p class="text-gray-200 text-sm mb-1">${advisory.situation_summary || advisory.message || ''}</p>
        ${advisory.recommended_action ? html`
          <p class="text-gray-300 text-sm mt-2"><span class="font-semibold text-white">Recommendation:</span> ${advisory.recommended_action}</p>
        ` : null}
        ${advisory.plain_language ? html`
          <p class="text-gray-400 text-sm mt-2 italic">${advisory.plain_language}</p>
        ` : null}
        <div class="flex gap-3 mt-4 flex-wrap">
          <button
            onClick=${onAccept}
            class="px-4 py-2 bg-green-600 hover:bg-green-500 text-white rounded font-semibold text-sm transition-colors">
            ✓ Accept
          </button>
          <button
            onClick=${onOverride}
            class="px-4 py-2 bg-red-700 hover:bg-red-600 text-white rounded font-semibold text-sm transition-colors">
            ✗ Override
          </button>
          <input
            type="text"
            placeholder="Override reason (optional)"
            value=${overrideReason}
            onInput=${e => setOverrideReason(e.target.value)}
            class="flex-1 min-w-[200px] bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500"
          />
        </div>
      </div>
    `;
  }

  // ── Zone Stats Row ─────────────────────────────────────────────────────────

  function ZoneStatsRow({ id, occ }) {
    const zone = ZONES[id];
    const pct = occ[id] || 0;
    const count = Math.round(pct * zone.capacity);
    const color = densityColor(pct);
    const label = riskLabel(pct);
    const barColors = {
      SAFE: 'bg-green-500', WATCH: 'bg-yellow-500', WARNING: 'bg-orange-500', CRITICAL: 'bg-red-500',
    };
    const textColors = {
      SAFE: 'text-green-400', WATCH: 'text-yellow-400', WARNING: 'text-orange-400', CRITICAL: 'text-red-400',
    };
    return html`
      <div class="flex items-center gap-3 py-2 border-b border-gray-700 last:border-0">
        <div class="w-36 text-sm font-semibold text-gray-100">Zone ${id} — ${zone.name}</div>
        <div class="w-28 text-xs text-gray-300 font-mono">${count}/${zone.capacity} (${Math.round(pct * 100)}%)</div>
        <div class="flex-1 h-3 bg-gray-700 rounded-full overflow-hidden">
          <div class="h-full rounded-full transition-all duration-300 ${barColors[label]}" style="width:${Math.round(pct * 100)}%"></div>
        </div>
        <div class="w-20 text-xs font-bold text-right ${textColors[label]}">${label === 'CRITICAL' ? '⚠ ' : ''}${label}</div>
      </div>
    `;
  }

  // ── Loading dots ───────────────────────────────────────────────────────────

  function LoadingDots() {
    return html`
      <span>
        <span class="dot-bounce dot-bounce-1 text-blue-400">●</span>
        <span class="dot-bounce dot-bounce-2 text-blue-400">●</span>
        <span class="dot-bounce dot-bounce-3 text-blue-400">●</span>
      </span>
    `;
  }

  // ── Chat bubble ────────────────────────────────────────────────────────────

  function ChatBubble({ msg, streaming }) {
    const isUser = msg.role === 'user';
    return html`
      <div class="flex ${isUser ? 'justify-end' : 'justify-start'} mb-3">
        <div class="max-w-[80%] rounded-lg px-4 py-2 text-sm whitespace-pre-wrap ${isUser
          ? 'bg-blue-600 text-white'
          : 'bg-gray-700 text-gray-100'} ${streaming && !isUser ? 'streaming-cursor' : ''}">
          ${msg.content}
        </div>
      </div>
    `;
  }

  // ── Main App ───────────────────────────────────────────────────────────────

  function App() {
    const [sessionId]                = useState(() => crypto.randomUUID());
    const [activeTab, setActiveTab]  = useState('simulation');
    const [model, setModel]          = useState('gemma');

    // Simulation state
    const [zoneOcc, setZoneOcc]      = useState({ A: 0.62, B: 0.45, C: 0.50 });
    const [running, setRunning]      = useState(false);
    const [simTime, setSimTime]      = useState(0);
    const [currentAdvisory, setCurrentAdvisory]   = useState(null);
    const [advisoryHistory, setAdvisoryHistory]   = useState([]);
    const [overrideReason, setOverrideReason]     = useState('');
    const [postAdvisoryAccepted, setPostAdvisoryAccepted] = useState(false);
    const [advisoryMsg, setAdvisoryMsg] = useState('');
    const [scanLoading, setScanLoading] = useState(false);
    const [agentLog, setAgentLog] = useState([]);
    const agentLogRef = useRef(null);
    const agentLogContainerRef = useRef(null);

    // Chat state
    const [chatMessages, setChatMessages]         = useState([]);
    const [chatInput, setChatInput]               = useState('');
    const [chatStreaming, setChatStreaming]        = useState(false);

    // Analytics state
    const [analyticsMessages, setAnalyticsMessages] = useState([]);
    const [analyticsInput, setAnalyticsInput]     = useState('');
    const [analyticsStreaming, setAnalyticsStreaming] = useState(false);
    const [eventHistory, setEventHistory]         = useState([]);
    const [historyLoading, setHistoryLoading]     = useState(false);

    // Refs for animation loop
    const canvasRef    = useRef(null);
    const rafRef       = useRef(null);
    const tickRef      = useRef(0);
    const zoneOccRef   = useRef({ A: 0.62, B: 0.45, C: 0.50 });
    const runningRef    = useRef(false);
    const pipelineRef   = useRef(false); // true while advisory pipeline is in flight
    const acceptedAtRef = useRef(-1);    // sim-second when operator accepted (-1 = not accepted)
    const acceptedFromRef = useRef(0);   // Zone A pct at moment of acceptance
    const advisoryRef   = useRef(null);
    const chatEndRef   = useRef(null);
    const analyticsEndRef = useRef(null);
    const dotsRef      = useRef({});
    const lastScanRef  = useRef(-999);
    const lastSensorRef = useRef(-999);

    // Keep refs in sync
    useEffect(() => { zoneOccRef.current = zoneOcc; }, [zoneOcc]);
    useEffect(() => { runningRef.current = running; }, [running]);
    // acceptedAtRef / acceptedFromRef are set directly in handleAccept — no effect needed
    useEffect(() => { advisoryRef.current = currentAdvisory; }, [currentAdvisory]);

    // Auto-scroll chat and agent log
    useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chatMessages]);
    useEffect(() => { analyticsEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [analyticsMessages]);
    useEffect(() => {
      const el = agentLogContainerRef.current;
      if (!el) return;
      const isNearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
      if (isNearBottom) el.scrollTop = el.scrollHeight;
    }, [agentLog]);

    const logEvent = useCallback((message, type = 'info') => {
      setAgentLog(prev => [...prev.slice(-49), { message, type, ts: Date.now() }]);
    }, []);

    // ── Sensor / scan helpers ────────────────────────────────────────────────

    const triggerScan = useCallback(async () => {
      if (scanLoading) return;
      const canvas = canvasRef.current;
      if (!canvas) return;
      setScanLoading(true);
      const pct = Math.round((zoneOccRef.current.A || 0) * 100);
      logEvent(`Zone A at ${pct}% — sending canvas to vision model for zone classification`, 'scan');
      try {
        const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
        const fd = new FormData();
        fd.append('file', blob, 'canvas.png');
        fd.append('zone_data', JSON.stringify(zoneOccRef.current));
        fd.append('session_id', sessionId);
        fd.append('model', model);
        await fetch('/api/scan-zone', { method: 'POST', body: fd });
        logEvent(`Vision scan complete`, 'info');
      } catch (e) {
        console.warn('scan-zone error', e);
      } finally {
        setScanLoading(false);
      }
    }, [sessionId, model, scanLoading, logEvent]);

    const triggerSensorRun = useCallback(async () => {
      if (pipelineRef.current || advisoryRef.current) return; // pipeline in flight or advisory showing
      pipelineRef.current = true;
      const occ = zoneOccRef.current;
      // Server expects: [{zones: {A: {pct, count, capacity}, B: {...}, C: {...}}}]
      const readings = [{
        tick: Math.floor(tickRef.current / 1000),
        zones: Object.fromEntries(
          Object.entries(occ).map(([zid, pct]) => [
            zid,
            { pct, count: Math.round(pct * ZONES[zid].capacity), capacity: ZONES[zid].capacity },
          ])
        ),
      }];
      setScanLoading(true);
      logEvent(`Zone A at ${Math.round(occ.A * 100)}% — Tier 1 threshold exceeded, starting advisory pipeline`, 'tier1');
      try {
        const canvas = canvasRef.current;
        const blob = canvas ? await new Promise(res => canvas.toBlob(res, 'image/png')) : null;
        const fd = new FormData();
        fd.append('session_id', sessionId);
        fd.append('model', model);
        fd.append('sensor_readings', JSON.stringify(readings));
        if (blob) fd.append('image', blob, 'canvas.png');
        await streamSSE('/api/run-sensors', { method: 'POST', body: fd }, (event, data) => {
          if (event === 'tier1') {
            try {
              const d = JSON.parse(data);
              if (d.triggered) {
                logEvent(`Tier 1 ✓ — Zone ${d.max_zone} at ${Math.round(d.max_pct * 100)}% exceeds 90% threshold`, 'tier1');
              } else {
                logEvent(`Tier 1 — peak ${Math.round(d.max_pct * 100)}%, below threshold, no advisory needed`, 'info');
              }
            } catch (_) {}
          } else if (event === 'status') {
            try {
              const d = JSON.parse(data);
              logEvent(d.message, 'info');
            } catch (_) {}
          } else if (event === 'tier2') {
            try {
              const d = JSON.parse(data);
              logEvent(`Tier 2 — DeepSeek classified risk as: ${d.classification}`, d.classification === 'CRITICAL' ? 'critical' : 'tier2');
            } catch (_) {}
          } else if (event === 'tier3_advisory') {
            try {
              const adv = JSON.parse(data);
              logEvent(`Tier 3 — Nemotron Ultra issued advisory: "${adv.recommended_action}"`, 'advisory');
              const entry = {
                id: adv.id || crypto.randomUUID(),
                zone: adv.zone || 'A',
                risk_level: adv.risk_level || 'CRITICAL',
                situation_summary: adv.situation_summary || '',
                recommended_action: adv.recommended_action || '',
                plain_language: adv.plain_language || '',
                timestamp: new Date().toISOString(),
                status: 'pending',
              };
              setCurrentAdvisory(entry);
              setAdvisoryHistory(h => [...h, entry]);
            } catch (_) {}
          }
        });
      } catch (e) {
        logEvent(`Advisory pipeline error: ${e.message}`, 'error');
        console.warn('run-sensors error', e);
      } finally {
        setScanLoading(false);
        pipelineRef.current = false;
      }
    }, [sessionId, model, logEvent]);

    // ── Animation loop ───────────────────────────────────────────────────────

    const tick = useCallback(() => {
      if (!runningRef.current) return;
      tickRef.current += 150; // 3x real-time: 150ms sim per 50ms real
      const secs = tickRef.current / 1000;

      let newOcc = interpolateOcc(secs);

      // After accept: drive Zone A toward 81% over 12 sim-seconds, then reset timeline
      if (acceptedAtRef.current >= 0) {
        const elapsed = secs - acceptedAtRef.current;
        if (elapsed < 12) {
          const dropFrac = elapsed / 12;
          newOcc.A = acceptedFromRef.current + (0.81 - acceptedFromRef.current) * dropFrac;
        } else {
          // Drop complete — reset timeline to t=30 (building phase) so cycle repeats
          tickRef.current = 30 * 1000;
          acceptedAtRef.current = -1;
          acceptedFromRef.current = 0;
          setPostAdvisoryAccepted(false);
        }
      }

      zoneOccRef.current = newOcc;
      setZoneOcc({ ...newOcc });
      setSimTime(Math.floor(secs));

      // Nudge dots for natural movement
      Object.keys(ZONES).forEach(id => {
        if (!dotsRef.current[id]) dotsRef.current[id] = initDots(id, newOcc[id] || 0);
        nudgeDots(dotsRef.current[id], id, newOcc[id] || 0);
      });

      if (canvasRef.current) {
        drawCanvas(canvasRef.current, newOcc, Math.floor(secs), dotsRef.current);
      }

      // Auto-scan every 5 sim-seconds if zone A > 85%
      if (newOcc.A > 0.85 && secs - lastScanRef.current >= 5) {
        lastScanRef.current = secs;
        triggerScan();
      }
      // Run sensors every 10 sim-seconds if zone A > 90%
      if (newOcc.A > 0.90 && secs - lastSensorRef.current >= 10) {
        lastSensorRef.current = secs;
        triggerSensorRun();
      }

      rafRef.current = setTimeout(tick, 50);
    }, [triggerScan, triggerSensorRun]);

    const startSimulation = useCallback(() => {
      if (runningRef.current) return;
      tickRef.current = 0;
      acceptedAtRef.current = -1;
      acceptedFromRef.current = 0;
      pipelineRef.current = false;
      lastScanRef.current = -999;
      lastSensorRef.current = -999;
      const initOcc = { A: 0.62, B: 0.45, C: 0.50 };
      dotsRef.current = Object.fromEntries(
        Object.keys(ZONES).map(id => [id, initDots(id, initOcc[id])])
      );
      setPostAdvisoryAccepted(false);
      setCurrentAdvisory(null);
      setAdvisoryMsg('');
      setAgentLog([]);
      setZoneOcc(initOcc);
      zoneOccRef.current = initOcc;
      runningRef.current = true;
      setRunning(true);
      rafRef.current = setTimeout(tick, 50);
    }, [tick]);

    const stopSimulation = useCallback(() => {
      runningRef.current = false;
      setRunning(false);
      if (rafRef.current) clearTimeout(rafRef.current);
    }, []);

    // Draw initial canvas
    useEffect(() => {
      if (canvasRef.current) {
        drawCanvas(canvasRef.current, { A: 0.62, B: 0.45, C: 0.50 }, 0, {});
      }
    }, []);

    useEffect(() => {
      return () => { if (rafRef.current) clearTimeout(rafRef.current); };
    }, []);

    // ── Advisory actions ─────────────────────────────────────────────────────

    const handleAccept = useCallback(async () => {
      if (!currentAdvisory) return;
      const id = currentAdvisory.id;
      try {
        const fd = new FormData();
        fd.append('session_id', sessionId);
        await fetch(`/api/advisory/${id}/accept`, { method: 'POST', body: fd });
      } catch (_) {}
      setAdvisoryHistory(h => h.map(a => a.id === id ? { ...a, status: 'accepted' } : a));
      setCurrentAdvisory(null);
      setPostAdvisoryAccepted(true);
      acceptedAtRef.current = tickRef.current / 1000;
      acceptedFromRef.current = zoneOccRef.current.A;
      setAdvisoryMsg('Advisory accepted — reducing Zone A ingress.');
    }, [currentAdvisory, sessionId]);

    const handleOverride = useCallback(async () => {
      if (!currentAdvisory) return;
      const id = currentAdvisory.id;
      try {
        const fd = new FormData();
        fd.append('session_id', sessionId);
        if (overrideReason) fd.append('reason', overrideReason);
        await fetch(`/api/advisory/${id}/override`, { method: 'POST', body: fd });
      } catch (_) {}
      setAdvisoryHistory(h => h.map(a => a.id === id ? { ...a, status: 'overridden', override_reason: overrideReason } : a));
      setCurrentAdvisory(null);
      setOverrideReason('');
      setAdvisoryMsg('Override recorded — simulation continues.');
    }, [currentAdvisory, overrideReason, sessionId]);

    // ── Chat ─────────────────────────────────────────────────────────────────

    const sendChat = useCallback(async (e) => {
      e?.preventDefault();
      if (!chatInput.trim() || chatStreaming) return;
      const text = chatInput.trim();
      setChatInput('');
      setChatMessages(m => [...m, { role: 'user', content: text }]);
      setChatMessages(m => [...m, { role: 'assistant', content: '' }]);
      setChatStreaming(true);
      try {
        await streamSSE('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: sessionId, model }),
        }, (event, data) => {
          if (event === 'stream') {
            try {
              const token = JSON.parse(data).token || '';
              setChatMessages(m => {
                const msgs = [...m];
                msgs[msgs.length - 1] = { role: 'assistant', content: msgs[msgs.length - 1].content + token };
                return msgs;
              });
            } catch (_) {}
          }
        });
      } catch (e) {
        setChatMessages(m => {
          const msgs = [...m];
          msgs[msgs.length - 1] = { role: 'assistant', content: 'Error: ' + e.message };
          return msgs;
        });
      } finally {
        setChatStreaming(false);
      }
    }, [chatInput, chatStreaming, sessionId, model]);

    // ── Analytics ────────────────────────────────────────────────────────────

    const sendAnalytics = useCallback(async (question) => {
      const text = question || analyticsInput.trim();
      if (!text || analyticsStreaming) return;
      setAnalyticsInput('');
      setAnalyticsMessages(m => [...m, { role: 'user', content: text }]);
      setAnalyticsMessages(m => [...m, { role: 'assistant', content: '' }]);
      setAnalyticsStreaming(true);
      try {
        await streamSSE('/api/analytics', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: sessionId }),
        }, (event, data) => {
          if (event === 'stream') {
            try {
              const token = JSON.parse(data).token || '';
              setAnalyticsMessages(m => {
                const msgs = [...m];
                msgs[msgs.length - 1] = { role: 'assistant', content: msgs[msgs.length - 1].content + token };
                return msgs;
              });
            } catch (_) {}
          }
        });
      } catch (e) {
        setAnalyticsMessages(m => {
          const msgs = [...m];
          msgs[msgs.length - 1] = { role: 'assistant', content: 'Error: ' + e.message };
          return msgs;
        });
      } finally {
        setAnalyticsStreaming(false);
      }
    }, [analyticsInput, analyticsStreaming, sessionId]);

    const loadEventHistory = useCallback(async () => {
      setHistoryLoading(true);
      try {
        const resp = await fetch('/api/event-history');
        if (resp.ok) {
          const json = await resp.json();
          setEventHistory(json.records || []);
        }
      } catch (_) {}
      setHistoryLoading(false);
    }, []);

    useEffect(() => {
      if (activeTab === 'history') loadEventHistory();
    }, [activeTab]);

    // ── Render helpers ───────────────────────────────────────────────────────

    const TABS = [
      { id: 'simulation', label: 'Live Simulation' },
      { id: 'advisories', label: 'Advisory History' },
      { id: 'chat',       label: 'Operator Chat' },
      { id: 'history',   label: 'Event History' },
    ];

    const SUGGESTIONS = [
      "What days had the most advisories?",
      "When was Zone A most dangerous?",
      "What's the busiest day of week?",
      "Show average crowd density by zone.",
    ];

    const riskBadge = (level) => {
      const map = {
        CRITICAL: 'bg-red-600 text-white',
        WARNING:  'bg-orange-600 text-white',
        WATCH:    'bg-yellow-600 text-black',
        SAFE:     'bg-green-600 text-white',
      };
      return html`<span class="px-2 py-0.5 rounded text-xs font-bold ${map[level] || map.WARNING}">${level}</span>`;
    };

    return html`
      <div class="min-h-screen bg-gray-900 text-gray-100">
        <!-- Header -->
        <header class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div>
            <h1 class="text-lg font-bold tracking-wide text-white">FESTIVAL OPS</h1>
            <span class="text-xs text-gray-400 font-mono">Crowd Management Dashboard</span>
          </div>
          <div class="flex items-center gap-4">
            <label class="text-xs text-gray-400">Model:</label>
            <select
              value=${model}
              onChange=${e => setModel(e.target.value)}
              class="bg-gray-700 border border-gray-600 text-sm rounded px-2 py-1 text-gray-100 focus:outline-none focus:border-blue-500">
              ${MODELS.map(m => html`<option value=${m.value}>${m.label}</option>`)}
            </select>
          </div>
        </header>

        <!-- Tab bar -->
        <div class="bg-gray-800 border-b border-gray-700 px-6 py-2 flex gap-2">
          ${TABS.map(tab => html`
            <button
              onClick=${() => setActiveTab(tab.id)}
              class="px-4 py-1.5 rounded-full text-sm font-medium transition-colors ${
                activeTab === tab.id
                  ? 'bg-blue-600 text-white'
                  : 'text-gray-400 hover:text-gray-200 hover:bg-gray-700'
              }">
              ${tab.label}
              ${tab.id === 'advisories' && advisoryHistory.length > 0
                ? html`<span class="ml-1.5 px-1.5 py-0.5 bg-gray-600 rounded-full text-xs">${advisoryHistory.length}</span>`
                : null}
            </button>
          `)}
        </div>

        <!-- Content -->
        <main class="p-6">

          <!-- ── Tab 1: Live Simulation ────────────────────────────────── -->
          ${activeTab === 'simulation' ? html`
            <div class="max-w-5xl mx-auto">
              <div class="flex items-center gap-3 mb-4">
                <h2 class="text-xl font-bold">Live Simulation</h2>
                ${scanLoading ? html`<span class="text-xs text-blue-400 font-mono">scanning...</span>` : null}
                <div class="ml-auto flex gap-2">
                  <button
                    onClick=${startSimulation}
                    disabled=${running}
                    class="px-4 py-2 bg-blue-600 hover:bg-blue-500 disabled:opacity-40 disabled:cursor-not-allowed text-white rounded font-semibold text-sm transition-colors">
                    Start Simulation
                  </button>
                  <button
                    onClick=${stopSimulation}
                    disabled=${!running}
                    class="px-4 py-2 bg-gray-700 hover:bg-gray-600 disabled:opacity-40 disabled:cursor-not-allowed text-white rounded font-semibold text-sm transition-colors">
                    Stop
                  </button>
                  <button
                    onClick=${() => {
                      stopSimulation();
                      tickRef.current = 0;
                      const init = { A: 0.62, B: 0.45, C: 0.50 };
                      setZoneOcc(init);
                      zoneOccRef.current = init;
                      setSimTime(0);
                      setCurrentAdvisory(null);
                      setAdvisoryMsg('');
                      setPostAdvisoryAccepted(false);
                      acceptedRef.current = false;
                      dotsRef.current = {};
                    if (canvasRef.current) drawCanvas(canvasRef.current, init, 0, {});
                    }}
                    class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded font-semibold text-sm transition-colors">
                    Reset
                  </button>
                </div>
              </div>

              <!-- Canvas -->
              <div class="bg-gray-800 rounded-xl overflow-hidden border border-gray-700 mb-4">
                <canvas
                  ref=${canvasRef}
                  width="800"
                  height="500"
                  style="width:100%;max-width:800px;display:block;margin:0 auto;"
                ></canvas>
              </div>

              <!-- Advisory message banner -->
              ${advisoryMsg ? html`
                <div class="mb-4 p-3 rounded-lg bg-gray-700 border border-gray-600 text-sm text-gray-200">
                  ${advisoryMsg}
                </div>
              ` : null}

              <!-- Current advisory card -->
              ${currentAdvisory ? html`
                <${AdvisoryCard}
                  advisory=${currentAdvisory}
                  onAccept=${handleAccept}
                  onOverride=${handleOverride}
                  overrideReason=${overrideReason}
                  setOverrideReason=${setOverrideReason}
                />
              ` : null}

              <!-- Zone stats + agent log side by side -->
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <div class="bg-gray-800 rounded-xl border border-gray-700 p-4">
                  <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">Zone Status</h3>
                  ${['A', 'B', 'C'].map(id => html`<${ZoneStatsRow} id=${id} occ=${zoneOcc} />`)}
                </div>

                <div class="bg-gray-800 rounded-xl border border-gray-700 p-4 flex flex-col" style="min-height:140px;">
                  <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2">Agent Activity</h3>
                  <div ref=${agentLogContainerRef} class="flex-1 overflow-y-auto text-xs font-mono space-y-1" style="max-height:160px;">
                    ${agentLog.length === 0 ? html`
                      <p class="text-gray-600 italic">Waiting for simulation to start...</p>
                    ` : agentLog.map((entry, i) => {
                      const colors = {
                        info:     'text-gray-400',
                        scan:     'text-blue-400',
                        tier1:    'text-yellow-400',
                        tier2:    'text-orange-400',
                        critical: 'text-red-400',
                        advisory: 'text-red-300 font-bold',
                        error:    'text-red-500',
                      };
                      const icons = {
                        info:     '·',
                        scan:     '📷',
                        tier1:    '⚡',
                        tier2:    '🔍',
                        critical: '🔴',
                        advisory: '⚠',
                        error:    '✗',
                      };
                      return html`
                        <div key=${i} class="${colors[entry.type] || 'text-gray-400'}">
                          ${icons[entry.type] || '·'} ${entry.message}
                        </div>
                      `;
                    })}
                  </div>
                </div>

              </div>

              <!-- Simulation timeline hints -->
              <div class="mt-4 bg-gray-800 rounded-xl border border-gray-700 p-4">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">Timeline</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs font-mono">
                  ${[
                    { t: 'T=0s',  label: 'All safe — green', done: simTime >= 0 },
                    { t: 'T=30s', label: 'Zone A → WATCH', done: simTime >= 30 },
                    { t: 'T=48s', label: 'Zone A → WARNING', done: simTime >= 48 },
                    { t: 'T=60s', label: 'Zone A → CRITICAL', done: simTime >= 60 },
                  ].map(ev => html`
                    <div class="p-2 rounded ${ev.done ? 'bg-gray-700 text-gray-200' : 'bg-gray-900 text-gray-500'}">
                      <div class="font-bold">${ev.t}</div>
                      <div>${ev.label}</div>
                    </div>
                  `)}
                </div>
              </div>
            </div>
          ` : null}

          <!-- ── Tab 2: Advisory History ────────────────────────────────── -->
          ${activeTab === 'advisories' ? html`
            <div class="max-w-3xl mx-auto">
              <h2 class="text-xl font-bold mb-4">Advisory History</h2>
              ${advisoryHistory.length === 0 ? html`
                <div class="text-center py-16 text-gray-500">
                  <div class="text-4xl mb-3">📋</div>
                  <p>No advisories issued this session yet.</p>
                  <p class="text-sm mt-1">Run the simulation and wait for Zone A to reach CRITICAL.</p>
                </div>
              ` : advisoryHistory.map((adv, i) => {
                const borderColors = {
                  CRITICAL: 'border-red-500',
                  WARNING:  'border-orange-500',
                  WATCH:    'border-yellow-500',
                  SAFE:     'border-green-500',
                };
                const bgColors = {
                  CRITICAL: 'bg-red-950',
                  WARNING:  'bg-orange-950',
                  WATCH:    'bg-yellow-950',
                  SAFE:     'bg-green-950',
                };
                const level = adv.risk_level || 'WARNING';
                return html`
                  <div key=${i} class="border-l-4 rounded-lg p-4 mb-3 ${borderColors[level] || borderColors.WARNING} ${bgColors[level] || bgColors.WARNING}">
                    <div class="flex items-center gap-2 mb-2">
                      ${riskBadge(level)}
                      <span class="text-gray-400 text-xs font-mono ml-auto">${new Date(adv.timestamp).toLocaleTimeString()}</span>
                    </div>
                    <p class="text-sm text-gray-200 mb-1">${adv.situation_summary}</p>
                    ${adv.recommended_action ? html`
                      <p class="text-xs text-gray-300 mt-1"><span class="font-semibold">Rec:</span> ${adv.recommended_action}</p>
                    ` : null}
                    ${adv.plain_language ? html`
                      <p class="text-xs text-gray-400 italic mt-1">${adv.plain_language}</p>
                    ` : null}
                    <div class="mt-3 pt-2 border-t border-gray-700 flex items-center gap-2">
                      ${adv.status === 'accepted' ? html`
                        <span class="text-xs font-bold text-green-400">✓ ACCEPTED</span>
                      ` : adv.status === 'overridden' ? html`
                        <span class="text-xs font-bold text-red-400">✗ OVERRIDDEN</span>
                        ${adv.override_reason ? html`<span class="text-xs text-gray-400">— ${adv.override_reason}</span>` : null}
                      ` : html`
                        <span class="text-xs font-bold text-yellow-400">⏳ PENDING</span>
                      `}
                    </div>
                  </div>
                `;
              })}
            </div>
          ` : null}

          <!-- ── Tab 3: Operator Chat ───────────────────────────────────── -->
          ${activeTab === 'chat' ? html`
            <div class="max-w-2xl mx-auto flex flex-col" style="height: calc(100vh - 200px);">
              <h2 class="text-xl font-bold mb-4">Operator Chat</h2>
              <div class="flex-1 bg-gray-800 rounded-xl border border-gray-700 p-4 overflow-y-auto mb-4 min-h-0">
                ${chatMessages.length === 0 ? html`
                  <div class="text-center text-gray-500 mt-8">
                    <p class="text-sm">Ask about current crowd conditions, protocols, or recommendations.</p>
                    <div class="mt-4 flex flex-col gap-2">
                      ${[
                        "What should I do when Zone A hits 95%?",
                        "Explain crowd crush dynamics.",
                        "What's the safe evacuation protocol?",
                      ].map(q => html`
                        <button
                          onClick=${() => { setChatInput(q); }}
                          class="text-xs text-blue-400 hover:text-blue-300 text-left px-3 py-1.5 bg-gray-700 rounded-lg transition-colors">
                          ${q}
                        </button>
                      `)}
                    </div>
                  </div>
                ` : chatMessages.map((msg, i) => html`
                  <${ChatBubble}
                    key=${i}
                    msg=${msg}
                    streaming=${chatStreaming && i === chatMessages.length - 1 && msg.role === 'assistant'}
                  />
                `)}
                <div ref=${chatEndRef}></div>
              </div>
              <form onSubmit=${sendChat} class="flex gap-2">
                <input
                  type="text"
                  value=${chatInput}
                  onInput=${e => setChatInput(e.target.value)}
                  placeholder="Ask about the situation..."
                  class="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500"
                />
                <button
                  type="submit"
                  disabled=${chatStreaming || !chatInput.trim()}
                  class="px-4 py-2 bg-blue-600 hover:bg-blue-500 disabled:opacity-40 disabled:cursor-not-allowed text-white rounded-lg font-semibold text-sm transition-colors">
                  ${chatStreaming ? html`<${LoadingDots}/>` : 'Send'}
                </button>
              </form>
            </div>
          ` : null}

          <!-- ── Tab 4: Event History ───────────────────────────────────── -->
          ${activeTab === 'history' ? html`
            <div class="max-w-4xl mx-auto">
              <h2 class="text-xl font-bold mb-4">Event History</h2>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <!-- Analytics chat -->
                <div class="flex flex-col bg-gray-800 rounded-xl border border-gray-700 p-4" style="min-height:420px;">
                  <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">Analytics — 90-Day History</h3>
                  <p class="text-xs text-gray-500 mb-3">Powered by Kimi K2.6 (long context)</p>

                  <!-- Suggestions -->
                  ${analyticsMessages.length === 0 ? html`
                    <div class="flex flex-col gap-2 mb-4">
                      ${SUGGESTIONS.map(q => html`
                        <button
                          onClick=${() => sendAnalytics(q)}
                          disabled=${analyticsStreaming}
                          class="text-xs text-blue-400 hover:text-blue-300 text-left px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg transition-colors disabled:opacity-40">
                          ${q}
                        </button>
                      `)}
                    </div>
                  ` : null}

                  <div class="flex-1 overflow-y-auto mb-3 min-h-0">
                    ${analyticsMessages.map((msg, i) => html`
                      <${ChatBubble}
                        key=${i}
                        msg=${msg}
                        streaming=${analyticsStreaming && i === analyticsMessages.length - 1 && msg.role === 'assistant'}
                      />
                    `)}
                    <div ref=${analyticsEndRef}></div>
                  </div>

                  <form onSubmit=${e => { e.preventDefault(); sendAnalytics(); }} class="flex gap-2">
                    <input
                      type="text"
                      value=${analyticsInput}
                      onInput=${e => setAnalyticsInput(e.target.value)}
                      placeholder="Query historical data..."
                      class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500"
                    />
                    <button
                      type="submit"
                      disabled=${analyticsStreaming || !analyticsInput.trim()}
                      class="px-3 py-2 bg-blue-600 hover:bg-blue-500 disabled:opacity-40 disabled:cursor-not-allowed text-white rounded-lg font-semibold text-sm transition-colors">
                      ${analyticsStreaming ? html`<${LoadingDots}/>` : 'Ask'}
                    </button>
                  </form>
                </div>

                <!-- Data browser -->
                <div class="bg-gray-800 rounded-xl border border-gray-700 p-4" style="min-height:420px;">
                  <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">Data Browser</h3>
                  ${historyLoading ? html`
                    <div class="flex justify-center mt-8"><${LoadingDots}/></div>
                  ` : eventHistory.length === 0 ? html`
                    <div class="text-center text-gray-500 mt-8">
                      <p class="text-sm">No historical records loaded.</p>
                      <button
                        onClick=${loadEventHistory}
                        class="mt-3 px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded text-sm text-gray-300 transition-colors">
                        Load Records
                      </button>
                    </div>
                  ` : html`
                    <div class="overflow-y-auto" style="max-height:360px;">
                      <table class="w-full text-xs font-mono">
                        <thead class="text-gray-400 border-b border-gray-700">
                          <tr>
                            <th class="text-left pb-2">Date</th>
                            <th class="text-left pb-2">Headliner</th>
                            <th class="text-right pb-2">Zone A</th>
                            <th class="text-right pb-2">Zone B</th>
                            <th class="text-right pb-2">Zone C</th>
                            <th class="text-right pb-2">Advisories</th>
                          </tr>
                        </thead>
                        <tbody>
                          ${eventHistory.map((row, i) => html`
                            <tr key=${i} class="border-b border-gray-800 hover:bg-gray-700">
                              <td class="py-1 text-gray-300">${row.date}</td>
                              <td class="py-1 text-gray-400 text-xs">${row.headliner || '—'}</td>
                              <td class="py-1 text-right text-blue-400">${Math.round((row.peak_zone_a_pct || 0) * 100)}%</td>
                              <td class="py-1 text-right text-blue-400">${Math.round((row.peak_zone_b_pct || 0) * 100)}%</td>
                              <td class="py-1 text-right text-blue-400">${Math.round((row.peak_zone_c_pct || 0) * 100)}%</td>
                              <td class="py-1 text-right ${(row.advisories_issued || 0) > 0 ? 'text-red-400' : 'text-gray-500'}">
                                ${row.advisories_issued || 0}
                              </td>
                            </tr>
                          `)}
                        </tbody>
                      </table>
                    </div>
                  `}
                </div>
              </div>
            </div>
          ` : null}

        </main>

        <!-- Footer -->
        <footer class="mt-8 border-t border-gray-800 px-6 py-3 flex items-center justify-between text-xs text-gray-600">
          <span>Festival Ops v1.0 — Crusoe Managed Inference</span>
          <span class="font-mono">Session: ${sessionId.slice(0, 8)}...</span>
        </footer>
      </div>
    `;
  }

  render(html`<${App}/>`, document.getElementById('root'));
</script>
<div id="root"></div>
</body>
</html>
