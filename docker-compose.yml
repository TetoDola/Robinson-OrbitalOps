services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orbitops
      POSTGRES_PASSWORD: orbitops
      POSTGRES_DB: orbitops
    ports:
      - "5432:5432"
    volumes:
      - orbitops_pg:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U orbitops -d orbitops"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  orbitops-api:
    build: ./backend
    container_name: orbitops-api
    command: ["python", "-m", "app.services.bootstrap"]
    environment:
      DATABASE_URL: postgresql+asyncpg://orbitops:orbitops@postgres:5432/orbitops
      REDIS_URL: redis://redis:6379/0
      CRUSOE_API_KEY: ${CRUSOE_API_KEY:-}
      CRUSOE_BASE_URL: https://api.inference.crusoecloud.com/v1/
      CRUSOE_MODEL: deepseek-ai/DeepSeek-V4-Flash
      CRUSOE_ENABLED: ${CRUSOE_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  orbitops_pg:
    driver: local
