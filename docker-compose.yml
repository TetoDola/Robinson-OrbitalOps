services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orbitops
      POSTGRES_PASSWORD: orbitops
      POSTGRES_DB: orbitops
    ports:
      - "5432:5432"
    volumes:
      - orbitops_pg:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U orbitops -d orbitops"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  orbitops-api:
    build: ./backend
    container_name: orbitops-api
    command: ["python", "-m", "app.services.bootstrap"]
    environment:
      DATABASE_URL: postgresql+asyncpg://orbitops:orbitops@postgres:5432/orbitops
      REDIS_URL: redis://redis:6379/0
      CRUSOE_API_KEY: ${CRUSOE_API_KEY:-}
      CRUSOE_BASE_URL: https://api.inference.crusoecloud.com/v1/
      CRUSOE_MODEL: ${CRUSOE_MODEL:-moonshotai/Kimi-K2.6}
      CRUSOE_MULTIMODAL_MODEL: ${CRUSOE_MULTIMODAL_MODEL:-nvidia/Nemotron-3-Nano-Omni-Reasoning-30B-A3B}
      CRUSOE_ENABLED: ${CRUSOE_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  orbitops-simulator:
    build: ./backend
    command: ["python", "-m", "app.simulator.telemetry_generator"]
    environment:
      DATABASE_URL: postgresql+asyncpg://orbitops:orbitops@postgres:5432/orbitops
      REDIS_URL: redis://redis:6379/0
      LOCAL_GPU_TELEMETRY_ENABLED: ${LOCAL_GPU_TELEMETRY_ENABLED:-false}
      LOCAL_GPU_NODE_ID: ${LOCAL_GPU_NODE_ID:-node-local}
      LOCAL_GPU_ASSET_ID: ${LOCAL_GPU_ASSET_ID:-gpu-local-0}
    depends_on:
      orbitops-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  orbitops-agents:
    build: ./backend
    command: ["python", "-m", "app.agents.runner"]
    environment:
      DATABASE_URL: postgresql+asyncpg://orbitops:orbitops@postgres:5432/orbitops
      REDIS_URL: redis://redis:6379/0
      CRUSOE_API_KEY: ${CRUSOE_API_KEY:-}
      CRUSOE_BASE_URL: https://api.inference.crusoecloud.com/v1/
      CRUSOE_MODEL: ${CRUSOE_MODEL:-moonshotai/Kimi-K2.6}
      CRUSOE_MULTIMODAL_MODEL: ${CRUSOE_MULTIMODAL_MODEL:-nvidia/Nemotron-3-Nano-Omni-Reasoning-30B-A3B}
      CRUSOE_ENABLED: ${CRUSOE_ENABLED:-false}
    depends_on:
      orbitops-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  orbitops-executor:
    build: ./backend
    command: ["python", "-m", "app.services.command_executor"]
    environment:
      DATABASE_URL: postgresql+asyncpg://orbitops:orbitops@postgres:5432/orbitops
      REDIS_URL: redis://redis:6379/0
    depends_on:
      orbitops-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  orbitops_pg:
    driver: local
