services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: robinson
      POSTGRES_PASSWORD: robinson
      POSTGRES_DB: robinson
    ports:
      - "5432:5432"
    volumes:
      - robinson_pg:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U robinson -d robinson"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  robinson-api:
    build: ./backend
    container_name: robinson-api
    command: ["python", "-m", "app.services.bootstrap"]
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://robinson:robinson@postgres:5432/robinson
      REDIS_URL: redis://redis:6379/0
      CRUSOE_BASE_URL: https://api.inference.crusoecloud.com/v1/
      CRUSOE_MODEL: ${CRUSOE_MODEL:-nvidia/Nemotron-3-Nano-Omni-Reasoning-30B-A3B}
      CRUSOE_MULTIMODAL_MODEL: ${CRUSOE_MULTIMODAL_MODEL:-nvidia/Nemotron-3-Nano-Omni-Reasoning-30B-A3B}
      CRUSOE_ENABLED: ${CRUSOE_ENABLED:-true}
      CRUSOE_AGENT_ANALYSIS_ENABLED: ${CRUSOE_AGENT_ANALYSIS_ENABLED:-true}
      ROBINSON_RADIATION_SOURCE: ${ROBINSON_RADIATION_SOURCE:-auto}
      ROBINSON_RADIATION_CACHE_SECONDS: ${ROBINSON_RADIATION_CACHE_SECONDS:-60}
      ROBINSON_RADIATION_TIMEOUT_SECONDS: ${ROBINSON_RADIATION_TIMEOUT_SECONDS:-2.5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  robinson-simulator:
    build: ./backend
    command: ["python", "-m", "app.simulator.telemetry_generator"]
    environment:
      DATABASE_URL: postgresql+asyncpg://robinson:robinson@postgres:5432/robinson
      REDIS_URL: redis://redis:6379/0
      LOCAL_GPU_TELEMETRY_ENABLED: ${LOCAL_GPU_TELEMETRY_ENABLED:-false}
      LOCAL_GPU_NODE_ID: ${LOCAL_GPU_NODE_ID:-node-local}
      LOCAL_GPU_ASSET_ID: ${LOCAL_GPU_ASSET_ID:-gpu-local-0}
    depends_on:
      robinson-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  robinson-agents:
    build: ./backend
    command: ["python", "-m", "app.agents.runner"]
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://robinson:robinson@postgres:5432/robinson
      REDIS_URL: redis://redis:6379/0
      CRUSOE_BASE_URL: https://api.inference.crusoecloud.com/v1/
      CRUSOE_MODEL: ${CRUSOE_MODEL:-nvidia/Nemotron-3-Nano-Omni-Reasoning-30B-A3B}
      CRUSOE_MULTIMODAL_MODEL: ${CRUSOE_MULTIMODAL_MODEL:-nvidia/Nemotron-3-Nano-Omni-Reasoning-30B-A3B}
      CRUSOE_ENABLED: ${CRUSOE_ENABLED:-true}
      CRUSOE_AGENT_ANALYSIS_ENABLED: ${CRUSOE_AGENT_ANALYSIS_ENABLED:-true}
    depends_on:
      robinson-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  robinson-executor:
    build: ./backend
    command: ["python", "-m", "app.services.command_executor"]
    environment:
      DATABASE_URL: postgresql+asyncpg://robinson:robinson@postgres:5432/robinson
      REDIS_URL: redis://redis:6379/0
    depends_on:
      robinson-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  robinson_pg:
    driver: local
